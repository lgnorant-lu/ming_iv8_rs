name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS + Windows: crates.io prebuilt libv8 (no TPOFF32 issue on those ABIs).
  build-wheels:
    name: Build (${{ matrix.platform.os }} / ${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-13
            os: macos
            arch: x86_64
            cibw_archs: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cibw_archs: arm64
          - runner: windows-latest
            os: windows
            arch: x86_64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/.rusty_v8
          key: cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-
            cargo-idx-${{ runner.os }}-

      - name: Cache cargo target (wheel)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: ~/cache/cibuildwheel
          key: cibw-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS: ${{ matrix.platform.cibw_archs }}
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_* cp313t-*"
          CIBW_CACHE_PATH: ~/cache/cibuildwheel
          CIBW_ENVIRONMENT: >
            CARGO_TERM_COLOR=always
            RUST_MIN_STACK=134217728
            CARGO_INCREMENTAL=0
          CIBW_BEFORE_ALL_MACOS: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.0 --profile minimal &&
            . "${CARGO_HOME:-$HOME/.cargo}/env" &&
            export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" &&
            (rustup component remove clippy 2>/dev/null || true)
          CIBW_ENVIRONMENT_MACOS: >
            PATH="$HOME/.cargo/bin:$PATH"
            RUST_MIN_STACK=134217728
            CARGO_TARGET_DIR=${{ github.workspace }}/target
          CIBW_ENVIRONMENT_WINDOWS: >
            RUST_MIN_STACK=134217728
          CIBW_BUILD_FRONTEND: "build"
          CIBW_TEST_COMMAND: >
            python -c "import iv8_rs; c=iv8_rs.JSContext(); assert c.eval('1+1')==2; c.close(); print('smoke_ok', iv8_rs.__version__)"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - name: Upload wheels
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: error

  # Path A: Linux x86_64 host + crates.io prebuilt only (no V8_FROM_SOURCE).
  # Sole question: does v8 150.x prebuilt link into cdylib without TPOFF32?
  # PASS → restore manylinux later. FAIL → Path B (self-built RUSTY_V8_ARCHIVE).
  build-linux-prebuilt:
    name: Build (linux / x86_64 prebuilt Path A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/.rusty_v8
            target
          key: linux-prebuilt-v8-${{ hashFiles('**/Cargo.lock', 'pyproject.toml') }}
          restore-keys: |
            linux-prebuilt-v8-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build wheel (maturin, prebuilt libv8 only)
        env:
          RUST_MIN_STACK: "134217728"
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          # Explicitly unset — must use crates.io download, not FROM_SOURCE.
          V8_FROM_SOURCE: ""
        run: |
          set -euo pipefail
          python -m pip install -U pip maturin
          mkdir -p wheelhouse
          # Fail fast on the known TLS symptom
          set +e
          maturin build --release --out wheelhouse --interpreter python3.13 2>&1 | tee /tmp/maturin.log
          code=${PIPESTATUS[0]}
          set -e
          if grep -q 'TPOFF32\|g_current_isolate_' /tmp/maturin.log; then
            echo "PATH_A_RESULT=FAIL_TPOFF32"
            exit 1
          fi
          if [ "$code" -ne 0 ]; then
            echo "PATH_A_RESULT=FAIL_OTHER exit=$code"
            exit "$code"
          fi
          echo "PATH_A_RESULT=LINK_OK"
          ls -la wheelhouse/

      - name: Smoke test
        run: |
          set -euo pipefail
          python -m pip install wheelhouse/*.whl
          python -c "import iv8_rs; c=iv8_rs.JSContext(); assert c.eval('1+1')==2; c.close(); print('smoke_ok', iv8_rs.__version__)"

      - name: Upload wheels
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-prebuilt
          path: wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: inputs.publish == 'true'
    needs: [build-wheels, build-linux-prebuilt]
    environment:
      name: pypi
      url: https://pypi.org/p/ming_iv8_rs
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
