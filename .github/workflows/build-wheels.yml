name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Build (${{ matrix.platform.os }} / ${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            cibw_archs: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: aarch64
            cibw_archs: aarch64
          - runner: macos-13
            os: macos
            arch: x86_64
            cibw_archs: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cibw_archs: arm64
          - runner: windows-latest
            os: windows
            arch: x86_64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux aarch64)
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt

      # Host-side caches: registry + target used when CARGO_* point into /project
      # (Linux docker builds write target to mounted project dir for reuse).
      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/.rusty_v8
          key: cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-
            cargo-idx-${{ runner.os }}-

      - name: Cache cargo target (wheel)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: ~/cache/cibuildwheel
          key: cibw-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.platform.cibw_archs }}
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_* cp313t-*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_CACHE_PATH: ~/cache/cibuildwheel
          # Persist cargo/registry+target across container builds via project mount
          CIBW_ENVIRONMENT: >
            CARGO_TERM_COLOR=always
            RUST_MIN_STACK=134217728
            CARGO_INCREMENTAL=0
          # CARGO_HOME is under /project for cache reuse; rustup then writes env there,
          # NOT $HOME/.cargo/env — source the CARGO_HOME path (POSIX `.`, not bash `source`).
          # BEFORE_ALL runs under sh (not bash): use `.` only, never `source`.
          # r12: toolset ships libstdc++.so under lib/gcc/... (not libstdc++.so.6).
          # Install full gcc-c++, resolve real .so, write /project/.iv8-ld.env.
          CIBW_BEFORE_ALL_LINUX: >
            (yum install -y gcc-toolset-12-gcc-c++ gcc-toolset-12-libstdc++-devel gcc-toolset-12-runtime 2>&1 ||
             dnf install -y gcc-toolset-12-gcc-c++ gcc-toolset-12-libstdc++-devel gcc-toolset-12-runtime 2>&1 ||
             true) &&
            find /opt/rh/gcc-toolset-12 -name 'libstdc++*' 2>/dev/null | head -40 &&
            LIBSTDCPP=$(find /opt/rh/gcc-toolset-12 -name 'libstdc++.so.6' 2>/dev/null | head -1) &&
            if [ -z "$LIBSTDCPP" ]; then LIBSTDCPP=$(find /opt/rh/gcc-toolset-12 -name 'libstdc++.so' 2>/dev/null | head -1); fi &&
            if [ -z "$LIBSTDCPP" ]; then echo "FATAL: no libstdc++ under gcc-toolset-12" >&2; exit 1; fi &&
            if [ -L "$LIBSTDCPP" ]; then LIBSTDCPP=$(readlink -f "$LIBSTDCPP" || true); fi &&
            echo "Using LIBSTDCPP=$LIBSTDCPP" &&
            (strings "$LIBSTDCPP" 2>/dev/null | grep GLIBCXX_3.4.26 >/dev/null || echo "WARN: GLIBCXX_3.4.26 string not found in $LIBSTDCPP") &&
            LIBDIR=$(dirname "$LIBSTDCPP") &&
            printf 'export LD_LIBRARY_PATH=%s:/lib64\nexport LIBRARY_PATH=%s\nexport PATH=/opt/rh/gcc-toolset-12/root/usr/bin:$PATH\n' "$LIBDIR" "$LIBDIR" > /project/.iv8-ld.env &&
            if [ -f "$LIBSTDCPP" ]; then printf 'export LD_PRELOAD=%s\n' "$LIBSTDCPP" >> /project/.iv8-ld.env; fi &&
            cat /project/.iv8-ld.env &&
            . /project/.iv8-ld.env &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.0 --profile minimal &&
            . "${CARGO_HOME:-$HOME/.cargo}/env" &&
            export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" &&
            (rustup component remove clippy 2>/dev/null || true)
          # Linux cdylib + rusty_v8: git v8 + V8_FROM_SOURCE + monolithic TLS.
          # BEFORE_BUILD reloads discovered libstdc++ paths for Chromium bindgen.
          CIBW_BEFORE_BUILD_LINUX: >
            . /project/.iv8-ld.env &&
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH LD_PRELOAD=$LD_PRELOAD" &&
            (ldd "$LD_PRELOAD" 2>/dev/null || true)
          CIBW_ENVIRONMENT_LINUX: >
            PATH=/opt/rh/gcc-toolset-12/root/usr/bin:/project/.cargo-cibw/bin:/root/.cargo/bin:$PATH
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            RUST_MIN_STACK=134217728
            CARGO_TARGET_DIR=/project/target
            CARGO_HOME=/project/.cargo-cibw
            RUSTUP_HOME=/project/.rustup-cibw
            V8_FROM_SOURCE=1
            GN_ARGS="v8_monolithic=true v8_monolithic_for_shared_library=true"
          CIBW_BEFORE_ALL_MACOS: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.0 --profile minimal &&
            . "${CARGO_HOME:-$HOME/.cargo}/env" &&
            export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" &&
            (rustup component remove clippy 2>/dev/null || true)
          CIBW_ENVIRONMENT_MACOS: >
            PATH="$HOME/.cargo/bin:$PATH"
            RUST_MIN_STACK=134217728
            CARGO_TARGET_DIR=${{ github.workspace }}/target
          CIBW_ENVIRONMENT_WINDOWS: >
            RUST_MIN_STACK=134217728
          CIBW_BUILD_FRONTEND: "build"
          CIBW_TEST_REQUIRES: "pytest"
          # Avoid tests/conftest.py importorskip against half-imported package
          CIBW_TEST_COMMAND: >
            python -c "import iv8_rs; c=iv8_rs.JSContext(); assert c.eval('1+1')==2; c.close(); print('smoke_ok', iv8_rs.__version__)"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - name: Upload wheels
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: inputs.publish == 'true'
    needs: [build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/ming_iv8_rs
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
