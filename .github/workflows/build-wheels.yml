name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Build (${{ matrix.platform.os }} / ${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            cibw_archs: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: aarch64
            cibw_archs: aarch64
          - runner: macos-13
            os: macos
            arch: x86_64
            cibw_archs: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cibw_archs: arm64
          - runner: windows-latest
            os: windows
            arch: x86_64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux aarch64)
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.rusty_v8
            target
          key: ${{ runner.os }}-${{ matrix.platform.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.arch }}-cargo-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.platform.cibw_archs }}
          CIBW_BUILD: "cp313-* cp313t-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env
          CIBW_ENVIRONMENT_LINUX: >
            PATH="$HOME/.cargo/bin:$PATH"
            CARGO_NET_GIT_FETCH_WITH_CLI=true
          CIBW_BEFORE_ALL_MACOS: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env
          CIBW_ENVIRONMENT_MACOS: >
            PATH="$HOME/.cargo/bin:$PATH"
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests/smoke_test.py -q"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/*.whl
          retention-days: 30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: inputs.publish == 'true'
    needs: [build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/iv8-rs
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
