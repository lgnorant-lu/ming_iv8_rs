name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after building"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Build (${{ matrix.platform.os }} / ${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            cibw_archs: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: aarch64
            cibw_archs: aarch64
          - runner: macos-13
            os: macos
            arch: x86_64
            cibw_archs: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cibw_archs: arm64
          - runner: windows-latest
            os: windows
            arch: x86_64
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux aarch64)
        if: matrix.platform.os == 'linux' && matrix.platform.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt

      # Host-side caches: registry + target used when CARGO_* point into /project
      # (Linux docker builds write target to mounted project dir for reuse).
      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/.rusty_v8
          key: cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-idx-${{ runner.os }}-${{ matrix.platform.arch }}-
            cargo-idx-${{ runner.os }}-

      - name: Cache cargo target (wheel)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-tgt-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: ~/cache/cibuildwheel
          key: cibw-${{ runner.os }}-${{ matrix.platform.arch }}-${{ hashFiles('**/Cargo.lock', 'pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-${{ matrix.platform.arch }}-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS: ${{ matrix.platform.cibw_archs }}
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_* cp313t-*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_CACHE_PATH: ~/cache/cibuildwheel
          # Persist cargo/registry+target across container builds via project mount
          CIBW_ENVIRONMENT: >
            CARGO_TERM_COLOR=always
            RUST_MIN_STACK=134217728
            CARGO_INCREMENTAL=0
          # CARGO_HOME is under /project for cache reuse; rustup then writes env there,
          # NOT $HOME/.cargo/env — source the CARGO_HOME path (POSIX `.`, not bash `source`).
          # gcc-toolset: Chromium rust-toolchain bindgen needs GLIBCXX_3.4.26+
          # (manylinux_2_28 base libstdc++ is too old for V8_FROM_SOURCE ninja).
          CIBW_BEFORE_ALL_LINUX: >
            (source /opt/rh/gcc-toolset-14/enable 2>/dev/null || source /opt/rh/gcc-toolset-13/enable 2>/dev/null || source /opt/rh/gcc-toolset-12/enable 2>/dev/null || true) &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.0 --profile minimal &&
            . "${CARGO_HOME:-$HOME/.cargo}/env" &&
            export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" &&
            (rustup component remove clippy 2>/dev/null || true)
          # Linux cdylib + rusty_v8: prebuilt libv8.a is local-exec TLS
          # (TPOFF32 / hidden g_current_isolate_ → cannot link -shared).
          # crates.io package cannot V8_FROM_SOURCE (vendor stripped).
          # Workspace uses git denoland/rusty_v8@v147.4.0; FROM_SOURCE + GN:
          #   v8_monolithic + v8_monolithic_for_shared_library → V8_TLS_USED_IN_LIBRARY
          # (v147 build.rs extra_cflags= is a no-op declare_args warning).
          # Quote GN_ARGS — CIBW_ENVIRONMENT splits unquoted spaces.
          CIBW_ENVIRONMENT_LINUX: >
            PATH="/opt/rh/gcc-toolset-14/root/usr/bin:/opt/rh/gcc-toolset-13/root/usr/bin:/opt/rh/gcc-toolset-12/root/usr/bin:/project/.cargo-cibw/bin:$HOME/.cargo/bin:$PATH"
            LD_LIBRARY_PATH="/opt/rh/gcc-toolset-14/root/usr/lib64:/opt/rh/gcc-toolset-13/root/usr/lib64:/opt/rh/gcc-toolset-12/root/usr/lib64:${LD_LIBRARY_PATH}"
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            RUST_MIN_STACK=134217728
            CARGO_TARGET_DIR=/project/target
            CARGO_HOME=/project/.cargo-cibw
            RUSTUP_HOME=/project/.rustup-cibw
            V8_FROM_SOURCE=1
            GN_ARGS="v8_monolithic=true v8_monolithic_for_shared_library=true"
          CIBW_BEFORE_ALL_MACOS: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.0 --profile minimal &&
            . "${CARGO_HOME:-$HOME/.cargo}/env" &&
            export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" &&
            (rustup component remove clippy 2>/dev/null || true)
          CIBW_ENVIRONMENT_MACOS: >
            PATH="$HOME/.cargo/bin:$PATH"
            RUST_MIN_STACK=134217728
            CARGO_TARGET_DIR=${{ github.workspace }}/target
          CIBW_ENVIRONMENT_WINDOWS: >
            RUST_MIN_STACK=134217728
          CIBW_BUILD_FRONTEND: "build"
          CIBW_TEST_REQUIRES: "pytest"
          # Avoid tests/conftest.py importorskip against half-imported package
          CIBW_TEST_COMMAND: >
            python -c "import iv8_rs; c=iv8_rs.JSContext(); assert c.eval('1+1')==2; c.close(); print('smoke_ok', iv8_rs.__version__)"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - name: Upload wheels
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.arch }}
          path: wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: inputs.publish == 'true'
    needs: [build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/ming_iv8_rs
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
